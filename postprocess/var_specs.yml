# Local variable specifications for NA-CORDEX-CMIP6 postprocessing.
# Units, standard_name, long_name, cell_methods, and frequency are pulled
# from the authoritative WCRP-CORDEX CMOR tables at runtime, with local
# NCAR-CORDEX-CMIP6_*.json tables providing supplemental entries for
# variables not in the upstream data request.
#
# Fields:
#   levels: vertical level type (single, fixed, pressure)
#   refh:   reference height in meters (omit if not applicable; used for
#           single-level vars at a fixed height above ground, e.g. tas at 2m,
#           sfcWind at 10m, ua100m at 100m)
#   plev:   pressure level in Pa (required for levels: pressure)
#   quant:  quantization level for lossy compression via NCO --ppc (DSD
#           notation, e.g. .2 = 2 decimal significant digits); omit for fx
#           variables
#
# YAML anchors (&name) and aliases (*name) are used to express shared specs
# explicitly.  Defaults are defined once and overridden where needed.
_defaults: &defaults
  levels: single
  quant: '.2'

# --- 2-meter temperature variables (shared specs) ---
tas: &tas_specs
  <<: *defaults
  refh: 2
tasmax:
  <<: *tas_specs
tasmin:
  <<: *tas_specs

# --- 10-meter wind variables (shared specs) ---
sfcWind: &wind_specs
  <<: *defaults
  refh: 10
uas:
  <<: *wind_specs
vas:
  <<: *wind_specs

# --- Remaining single-level variables ---
hurs:
  <<: *defaults
  refh: 2

huss:
  <<: *defaults
  refh: 2
  quant: '.6'

ps:
  <<: *defaults
  quant: '.0'

clt:
  <<: *defaults

pr:
  <<: *defaults
  quant: '.6'

evspsbl:
  <<: *defaults
  quant: '.6'

psl:
  <<: *defaults
  quant: '.0'

rsds:
  <<: *defaults
  quant: '.1'

rlds:
  <<: *defaults
  quant: '.1'

# --- AFWA diagnostic variables (supplemental, local CMOR table) ---
cape:
  <<: *defaults
  quant: '.1'
cin:
  <<: *defaults
  quant: '.1'
prw:
  <<: *defaults
  quant: '.1'
fzra:
  <<: *defaults
  quant: '.6'
wchill:
  <<: *defaults
  refh: 2
heatidx:
  <<: *defaults
  refh: 2

# --- Derived thermal comfort variable (supplemental, local CMOR table) ---
wbgt:
  <<: *defaults
  refh: 2
utci:
  <<: *defaults
  refh: 2
humidex:
  <<: *defaults
  refh: 2

# --- Hydrology / soil / snow variables (6-hourly) ---
mrro:
  <<: *defaults
  quant: '.6'
mrros:
  <<: *defaults
  quant: '.6'
mrso:
  <<: *defaults
  quant: '.1'
snw:
  <<: *defaults
  quant: '.1'
snd:
  <<: *defaults
  quant: '.3'
snm:
  <<: *defaults
  quant: '.6'

# --- Surface radiation and heat flux variables (6-hourly) ---
rsus:
  <<: *defaults
  quant: '.1'
rlus:
  <<: *defaults
  quant: '.1'
hfls:
  <<: *defaults
  quant: '.1'
hfss:
  <<: *defaults
  quant: '.1'

# --- Height-AGL wind variables (6-hourly, supplemental local CMOR table) ---
ua50m: &zlev_specs
  <<: *defaults
  refh: 50
va50m:
  <<: *zlev_specs
ua100m:
  <<: *zlev_specs
  refh: 100
va100m:
  <<: *zlev_specs
  refh: 100
ua150m:
  <<: *zlev_specs
  refh: 150
va150m:
  <<: *zlev_specs
  refh: 150

# --- Pressure-level variables (6-hourly) ---
# levels: pressure   - tells cmorize.sh to create a plev scalar coordinate
# plev: <Pa>         - pressure value in Pascals
ta700: &pres_specs
  <<: *defaults
  levels: pressure
  plev: 70000
ta500:
  <<: *pres_specs
  plev: 50000
ta250:
  <<: *pres_specs
  plev: 25000

ua700:
  <<: *pres_specs
ua500:
  <<: *pres_specs
  plev: 50000
ua250:
  <<: *pres_specs
  plev: 25000

va700:
  <<: *pres_specs
va500:
  <<: *pres_specs
  plev: 50000
va250:
  <<: *pres_specs
  plev: 25000

zg700:
  <<: *pres_specs
  quant: '.0'
zg500:
  <<: *pres_specs
  plev: 50000
  quant: '.0'
zg250:
  <<: *pres_specs
  plev: 25000
  quant: '.0'

hus700:
  <<: *pres_specs
  quant: '.6'
hus500:
  <<: *pres_specs
  plev: 50000
  quant: '.6'
hus250:
  <<: *pres_specs
  plev: 25000
  quant: '.6'

# --- Time-invariant variables (no compression) ---
sftlf:
  levels: fixed

orog:
  levels: fixed
